WHAT THIS IS
A phone-friendly tap-to-log form (this HTML file). Saves to a
Google Sheet via a Google Apps Script web app acting as the
backend. Sheet has stats/trajectory built in; Obsidian doesn't
need to touch the Sheet directly — it's just the data store.

LIVE PIECES
Sheet ID:        1wsxR30Z7pFAZInCtTfqzN3WQ7c4aYJOONf7AM_2WQdg
Sheet URL:       https://docs.google.com/spreadsheets/d/1wsxR30Z7pFAZInCtTfqzN3WQ7c4aYJOONf7AM_2WQdg/edit
Deployed exec:   https://script.google.com/macros/s/AKfycbydjK9gO8GvYncyzSHBIbgqTUcK-uzsxwWiiZdPL-1ykNZaVBezDQxY2lr_79J77B2nhw/exec
  (this URL is also hardcoded below as SCRIPT_URL — the two
  must always match; redeploying the script does NOT change
  the URL, but editing code requires Deploy → Manage
  deployments → pencil → New version → Deploy for the live
  URL to pick up the change)

SHEET STRUCTURE (4 tabs, built by Apps Script — see full code
at the bottom of this comment)
  • Plan       — one row per habit: Habit/Category/Type/Target/
                 Unit/Direction. Editing Target here is the
                 source of truth; Log's target row reads from
                 it live via formula.
  • Log        — one row per day (row 1 = headers, row 2 =
                 live target formulas, row 3+ = 90 pre-filled
                 dates going forward from setup day). Booleans
                 stored as ✔/✘. Conditional formatting colours
                 metric cells green/yellow/red vs target
                 (direction-aware) and highlights today's row.
                 Wake-up/Bedtime columns are intentionally left
                 uncoloured (time comparison wasn't worth the
                 complexity).
  • Trajectory — streak (consecutive hits), 30-day and 90-day
                 averages (or % completion for booleans), and
                 a trend arrow (↗/↘/→) per habit. Two line
                 charts (Steps, Day rating). Recalculated by
                 refreshTrajectory(), called automatically at
                 the end of every doPost save.
  • README     — plain-English explanation of the above, lives
                 in the Sheet itself for future-Drew.

HOW A SAVE WORKS
Every toggle tap, rating tap, or number/time field blur fires
saveField(key, value) immediately — a POST with just Date +
that one key, so nothing else on the row gets touched (backend
already skips undefined/empty keys, this just leans on that).
The big "Save to Sheets" button at the bottom is a fallback for
saving everything currently filled in at once. doPost() matches
today's row in Log by real Date comparison, translates app keys
to pretty column labels via KEY_MAP, converts TRUE/FALSE to
✔/✘, writes the cells, then calls refreshTrajectory(). If the
date falls outside the 90 pre-filled rows, it appends a new row
instead.

SECURITY
The Apps Script is deployed "Anyone can access" (required for a
no-login phone app), which makes the exec URL itself a de facto
credential — anyone with the URL could write garbage or read
targets. Mitigated with a shared secret: every request must
include the correct `secret` field/param or doPost/doGet reject
it. Secret lives as APP_SECRET in the HTML JS and SECRET in the
Apps Script — keep them in sync if it's ever rotated.

CLAUDE CAN LOG FOR YOU TOO
Since SCRIPT_URL is just a plain HTTP POST endpoint, Claude can
hit it directly (curl or WebFetch) when told something in chat,
e.g. "log workout done" — same payload shape as saveField()
above: { Date, secret, <key>: value }.

KNOWN GAP / NOT YET BUILT
The app does not yet fetch targets live from the Sheet on load
— doGet(?targets=1&secret=...) exists and returns current Plan
targets as JSON for this purpose, but the HTML's JS hasn't been
wired up to call it. Target chips currently come from
localStorage / hardcoded defaults only.

GOTCHA LEARNED THE HARD WAY

const SECRET = '4e78845d45f9634d2afdcd68da36c64f';

// Order matters — this defines column order in Log + row order in Plan.
// [ pretty label, category, type, target, unit, direction ]
const HABITS = [

// Maps the phone app's field keys -> pretty Log column labels above.
// 'sleep-hours' deliberately absent — Sleep is now a spreadsheet formula
// (previous night's Bedtime -> today's Wake-up), not app-logged.
const KEY_MAP = {
  'wake-time':     'Wake-up',
  'steps':         'Steps',
  'workout':       'Workout',
  'calories':      'Calories (kcal)',
  'water':         'Water (L)',
  'supplements':   'Supplements',
  'bedtime':       'Bedtime',
  'morning-pages': 'Morning pages (min)',
  'writing':       'Writing (min)',

const DAYS_TO_PREFILL = 90;
const LOG_DATA_START_ROW = 3; // row 1 = headers, row 2 = target row, row 3+ = data
const TIME_LABELS = ['Wake-up', 'Bedtime']; // left uncoloured, see chat

function setupSheets() {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  const tz = Session.getScriptTimeZone();

  // ---------- PLAN ----------
  let plan = ss.getSheetByName('Plan') || ss.insertSheet('Plan');
  plan.clear();
  plan.getRange(1, 1, 1, 6).setValues([['Habit', 'Category', 'Type', 'Target', 'Unit', 'Direction']])
    .setFontWeight('bold').setBackground('#efefef');
  plan.getRange(2, 1, HABITS.length, 6).setValues(HABITS);
  plan.setFrozenRows(1);
  plan.autoResizeColumns(1, 6);

  // ---------- LOG ----------
  let log = ss.getSheetByName('Log') || ss.insertSheet('Log');
  log.clear();
  const logHeaders = ['Date', ...HABITS.map(h => h[0])];
  log.getRange(1, 1, 1, logHeaders.length).setValues([logHeaders])
    .setFontWeight('bold').setBackground('#efefef');

  // Target row (row 2) — live-linked to Plan so editing Plan updates this automatically
  const targetFormulas = ['Target →', ...HABITS.map((h, i) => '=Plan!D' + (i + 2))];
  log.getRange(2, 1, 1, logHeaders.length).setValues([targetFormulas])
    .setFontStyle('italic').setFontColor('#888888');

  log.setFrozenRows(2);
  log.setFrozenColumns(1);

  // Pre-fill dates as real Date objects (formatted for display) so doPost can match reliably
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const rows = [];
  for (let i = 0; i < DAYS_TO_PREFILL; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    rows.push([d, ...Array(HABITS.length).fill('')]);
  }
  log.getRange(LOG_DATA_START_ROW, 1, rows.length, logHeaders.length).setValues(rows);
  log.getRange(LOG_DATA_START_ROW, 1, rows.length, 1).setNumberFormat('ddd d mmm');
  log.autoResizeColumns(1, logHeaders.length);

  // Conditional formatting — boolean columns (✔/✘) and metric columns (green/yellow/red vs target)
  const rules = [];
  HABITS.forEach((h, idx) => {
    const col = idx + 2; // Date is col 1
    const colLetter = columnToLetter(col);
    const range = log.getRange(LOG_DATA_START_ROW, col, rows.length, 1);
    const label = h[0];
    const type = h[2];
    const direction = h[5];

    if (TIME_LABELS.includes(label)) return; // deliberately left uncoloured

    if (type === 'boolean') {
      rules.push(SpreadsheetApp.newConditionalFormatRule()
        .whenTextEqualTo('✔').setBackground('#d9ead3').setRanges([range]).build());
      rules.push(SpreadsheetApp.newConditionalFormatRule()
        .whenTextEqualTo('✘').setBackground('#f4cccc').setRanges([range]).build());
    } else if (type === 'metric') {
      const target = colLetter + '$2';
      const cell = colLetter + LOG_DATA_START_ROW;
      if (direction === 'higher') {
        rules.push(SpreadsheetApp.newConditionalFormatRule()
          .whenFormulaSatisfied('=AND(' + cell + '<>"",' + cell + '>=' + target + ')')
          .setBackground('#d9ead3').setRanges([range]).build());
        rules.push(SpreadsheetApp.newConditionalFormatRule()
          .whenFormulaSatisfied('=AND(' + cell + '<>"",' + cell + '>=' + target + '*0.8,' + cell + '<' + target + ')')
          .setBackground('#fff2cc').setRanges([range]).build());
        rules.push(SpreadsheetApp.newConditionalFormatRule()
          .whenFormulaSatisfied('=AND(' + cell + '<>"",' + cell + '<' + target + '*0.8)')
          .setBackground('#f4cccc').setRanges([range]).build());
      } else { // lower is better
        rules.push(SpreadsheetApp.newConditionalFormatRule()
          .whenFormulaSatisfied('=AND(' + cell + '<>"",' + cell + '<=' + target + ')')
          .setBackground('#d9ead3').setRanges([range]).build());
        rules.push(SpreadsheetApp.newConditionalFormatRule()
          .whenFormulaSatisfied('=AND(' + cell + '<>"",' + cell + '<=' + target + '*1.2,' + cell + '>' + target + ')')
          .setBackground('#fff2cc').setRanges([range]).build());
        rules.push(SpreadsheetApp.newConditionalFormatRule()
          .whenFormulaSatisfied('=AND(' + cell + '<>"",' + cell + '>' + target + '*1.2)')
          .setBackground('#f4cccc').setRanges([range]).build());
      }
    }
  });
  log.setConditionalFormatRules(rules);

  // Highlight today's row on the date column
  const todayRule = SpreadsheetApp.newConditionalFormatRule()
    .whenFormulaSatisfied('=$A3=DATE(' + today.getFullYear() + ',' + (today.getMonth() + 1) + ',' + today.getDate() + ')')
    .setBackground('#fff59d')
    .setRanges([log.getRange(LOG_DATA_START_ROW, 1, rows.length, 1)])
    .build();
  log.setConditionalFormatRules([...log.getConditionalFormatRules(), todayRule]);

  // ---------- TRAJECTORY ----------
  let traj = ss.getSheetByName('Trajectory') || ss.insertSheet('Trajectory');
  traj.clear();
  traj.getRange(1, 1, 1, 6).setValues([['Habit', 'Type', 'Streak', '30-day', '90-day', 'Trend']])
    .setFontWeight('bold').setBackground('#efefef');
  traj.getRange(2, 1, HABITS.length, 2).setValues(HABITS.map(h => [h[0], h[2]]));
  traj.setFrozenRows(1);
  traj.autoResizeColumns(1, 6);

  // Two simple charts, anchored below the trend table
  const stepsCol = HABITS.findIndex(h => h[0] === 'Steps') + 2;
  const stepsChart = log.newChart()
    .setChartType(Charts.ChartType.LINE)
    .addRange(log.getRange(LOG_DATA_START_ROW, 1, DAYS_TO_PREFILL, 1))
    .addRange(log.getRange(LOG_DATA_START_ROW, stepsCol, DAYS_TO_PREFILL, 1))
    .setOption('title', 'Steps over time')
    .setPosition(HABITS.length + 4, 1, 0, 0)
    .build();
  traj.insertChart(stepsChart);

  const ratingCol = HABITS.findIndex(h => h[0] === 'Day rating') + 2;
  const ratingChart = log.newChart()
    .setChartType(Charts.ChartType.LINE)
    .addRange(log.getRange(LOG_DATA_START_ROW, 1, DAYS_TO_PREFILL, 1))
    .addRange(log.getRange(LOG_DATA_START_ROW, ratingCol, DAYS_TO_PREFILL, 1))
    .setOption('title', 'Day rating over time')
    .setPosition(HABITS.length + 22, 1, 0, 0)
    .build();
  traj.insertChart(ratingChart);

  // ---------- README ----------
  let readme = ss.getSheetByName('README') || ss.insertSheet('README');
  readme.clear();
  readme.getRange(1, 1).setValue('HABIT TRACKER').setFontWeight('bold').setFontSize(14);
  readme.getRange(2, 1).setValue(
    'FOUR TABS\n' +
    '• Plan — your targets. Edit the Target column here to change a goal; the Log tab picks it up automatically.\n' +
    '• Log — one row per day. Filled in by the phone app (or by hand). Green = on target, yellow = close, red = missed. ✔/✘ = booleans. Today\'s row is highlighted yellow in the date column.\n' +
    '• Trajectory — streaks and 30/90-day averages per habit, refreshed automatically every time the phone app saves. Trend arrow compares your last 30 days to your last 90.\n' +
    '• README — this page.\n\n' +
    'HOW LOGGING WORKS\n' +
    'Tap habits into the phone app and hit Save — it finds today\'s row in Log by date and fills it in. If you ever need to edit by hand, just type directly into the Log tab (✔ / ✘ for booleans, numbers for the rest).\n\n' +
    'STREAKS & TRENDS\n' +
    'Streak = consecutive days hitting target (or ✔ for booleans), counting back from the most recent logged day.\n' +
    '30-day / 90-day = average value (or % completion for booleans) over that window.\n' +
    'Trend: ↗ your last 30 days are meaningfully better than your last 90 · ↘ meaningfully worse · → about the same.\n\n' +
    'This system deliberately has no perfect-day badges — a missed day is just data, not a failure.'
  ).setWrap(true);
  readme.setColumnWidth(1, 650);

  // Tab order: Log, Plan, Trajectory, README
  ss.setActiveSheet(log); ss.moveActiveSheet(1);
  ss.setActiveSheet(plan); ss.moveActiveSheet(2);
  ss.setActiveSheet(traj); ss.moveActiveSheet(3);
  ss.setActiveSheet(readme); ss.moveActiveSheet(4);

  // Remove the default empty Sheet1 if it's still hanging around
  const sheet1 = ss.getSheetByName('Sheet1');
  if (sheet1 && ss.getSheets().length > 1) ss.deleteSheet(sheet1);

  refreshTrajectory();
  SpreadsheetApp.flush();
}

function columnToLetter(col) {
  let letter = '';
  while (col > 0) {
    const mod = (col - 1) % 26;
    letter = String.fromCharCode(65 + mod) + letter;
    col = Math.floor((col - mod) / 26);
  }
  return letter;
}

// Recomputes streak / 30-day / 90-day / trend for every habit and writes them into Trajectory.
// Called automatically at the end of every doPost save.
function refreshTrajectory() {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  const log = ss.getSheetByName('Log');
  const traj = ss.getSheetByName('Trajectory');
  if (!log || !traj) return;

  const values = log.getDataRange().getValues();
  const dataRows = values.slice(LOG_DATA_START_ROW - 1); // 0-indexed from row 3
  const targetRow = values[1];

  // Only consider rows up to today (future pre-filled rows are blank anyway, but be explicit)
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const loggedRows = dataRows.filter(r => r[0] instanceof Date && r[0] <= today);

  const out = HABITS.map((h, idx) => {
    const col = idx + 1; // index into row array (Date is 0)
    const label = h[0], type = h[2], direction = h[5];
    const target = parseFloat(targetRow[col]) || null;

    // Most recent logged rows first for streak calc
    const chron = [...loggedRows].reverse();

    let streak = 0;
    for (const r of chron) {
      const v = r[col];
      if (v === '' || v === null) break;
      const hit = type === 'boolean'
        ? v === '✔'
        : (target !== null && (direction === 'higher' ? Number(v) >= target : Number(v) <= target));
      if (hit) streak++; else break;
    }

    const windowAvg = (days) => {
      const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - days);
      const windowRows = loggedRows.filter(r => r[0] >= cutoff && r[col] !== '' && r[col] !== null);
      if (windowRows.length === 0) return null;
      if (type === 'boolean') {
        const hits = windowRows.filter(r => r[col] === '✔').length;
        return Math.round((hits / windowRows.length) * 100) + '%';
      }
      const nums = windowRows.map(r => Number(r[col])).filter(n => !isNaN(n));
      if (nums.length === 0) return null;
      return Math.round((nums.reduce((a, b) => a + b, 0) / nums.length) * 10) / 10;
    };

    const avg30 = windowAvg(30);
    const avg90 = windowAvg(90);

    let trend = '→';
    if (avg30 !== null && avg90 !== null) {
      const n30 = parseFloat(avg30), n90 = parseFloat(avg90);
      const diff = direction === 'lower' ? n90 - n30 : n30 - n90;
      const threshold = n90 * 0.05 || 0.5;
      trend = diff > threshold ? '↗' : diff < -threshold ? '↘' : '→';
    }

    return [label, type, streak, avg30 ?? '', avg90 ?? '', trend];
  });

  traj.getRange(2, 1, out.length, 6).setValues(out);
}

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    if (data.secret !== SECRET) {
      return ContentService
        .createTextOutput(JSON.stringify({ ok: false, error: 'unauthorized' }))
        .setMimeType(ContentService.MimeType.JSON);
    }
    const ss = SpreadsheetApp.openById(SHEET_ID);
    const sheet = ss.getSheetByName('Log');
    const tz = Session.getScriptTimeZone();
    const values = sheet.getDataRange().getValues();
    const headerRow = values[0];

    let rowIdx = -1;
    for (let i = LOG_DATA_START_ROW - 1; i < values.length; i++) {
      const cellDate = values[i][0];
      if (cellDate instanceof Date) {
        const iso = Utilities.formatDate(cellDate, tz, 'yyyy-MM-dd');
        if (iso === data['Date']) { rowIdx = i + 1; break; }
      }
    }

    // Translate app field keys -> pretty Log labels, and TRUE/FALSE -> ✔/✘
    const rowUpdates = {};
    Object.keys(KEY_MAP).forEach(appKey => {
      if (data[appKey] === undefined || data[appKey] === '') return;
      let val = data[appKey];
      if (val === 'TRUE') val = '✔';
      else if (val === 'FALSE') val = '✘';
      rowUpdates[KEY_MAP[appKey]] = val;
    });

    if (rowIdx === -1) {
      // Date fell outside the pre-filled range — append a new row
      const newRow = new Array(headerRow.length).fill('');
      newRow[0] = new Date(data['Date']);
      headerRow.forEach((h, i) => { if (rowUpdates[h] !== undefined) newRow[i] = rowUpdates[h]; });
      sheet.appendRow(newRow);
      sheet.getRange(sheet.getLastRow(), 1).setNumberFormat('ddd d mmm');
    } else {
      headerRow.forEach((h, i) => {
        if (rowUpdates[h] !== undefined) sheet.getRange(rowIdx, i + 1).setValue(rowUpdates[h]);
      });
    }

    refreshTrajectory();

    return ContentService
      .createTextOutput(JSON.stringify({ ok: true }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService
      .createTextOutput(JSON.stringify({ ok: false, error: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function doGet(e) {
  // ?targets=1&secret=... returns current Plan targets as JSON, for future app-side sync
  if (e && e.parameter && e.parameter.targets) {
    if (e.parameter.secret !== SECRET) {
      return ContentService.createTextOutput(JSON.stringify({ error: 'unauthorized' })).setMimeType(ContentService.MimeType.JSON);
    }
    const ss = SpreadsheetApp.openById(SHEET_ID);
    const plan = ss.getSheetByName('Plan');
    const rows = plan.getDataRange().getValues().slice(1);
    const targets = {};
    Object.keys(KEY_MAP).forEach(appKey => {
      const label = KEY_MAP[appKey];
      const row = rows.find(r => r[0] === label);
      if (row) targets[appKey] = row[3];
    });
    return ContentService.createTextOutput(JSON.stringify(targets)).setMimeType(ContentService.MimeType.JSON);
  }

  // ?today=1&secret=... returns whatever's actually been logged for a given
  // date (defaults to today, or pass &date=YYYY-MM-DD) as app-key JSON — this
  // is what powers the one-way Sheet -> Obsidian frontmatter sync, since the
  // Sheet stays the single source of truth regardless of whether an entry
  // came from the phone app or from Claude logging on Drew's behalf.
  if (e && e.parameter && e.parameter.today) {
    if (e.parameter.secret !== SECRET) {
      return ContentService.createTextOutput(JSON.stringify({ error: 'unauthorized' })).setMimeType(ContentService.MimeType.JSON);
    }
    const ss = SpreadsheetApp.openById(SHEET_ID);
    const sheet = ss.getSheetByName('Log');
    const tz = Session.getScriptTimeZone();
    const values = sheet.getDataRange().getValues();
    const headerRow = values[0];
    const targetDate = e.parameter.date || Utilities.formatDate(new Date(), tz, 'yyyy-MM-dd');

    let row = null;
    for (let i = LOG_DATA_START_ROW - 1; i < values.length; i++) {
      const cellDate = values[i][0];
      if (cellDate instanceof Date && Utilities.formatDate(cellDate, tz, 'yyyy-MM-dd') === targetDate) {
        row = values[i];
        break;
      }
    }

    const out = { date: targetDate };
    if (row) {
      Object.keys(KEY_MAP).forEach(appKey => {
        const label = KEY_MAP[appKey];
        const colIdx = headerRow.indexOf(label);
        if (colIdx === -1) return;
        let val = row[colIdx];
        if (val === '' || val === null || val === undefined) return;
        if (val === '✔') val = 'TRUE';
        else if (val === '✘') val = 'FALSE';
        else if (val instanceof Date) val = Utilities.formatDate(val, tz, 'HH:mm');
        out[appKey] = val;
      });
    }
    return ContentService.createTextOutput(JSON.stringify(out)).setMimeType(ContentService.MimeType.JSON);
  }

  return ContentService.createTextOutput('Habit Logger active');
}

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Habits">
<title>Habit Logger</title>
<style>
:root {
  --green: #40a66e;
  --green-light: rgba(64,166,110,0.1);
  --green-border: rgba(64,166,110,0.25);
  --border: #e5e7eb;
  --bg: #f2f3f5;
  --card: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --target-color: #c4c9d4;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --grid-cols: 3;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column;
  padding-bottom: calc(90px + var(--safe-bottom));
  overflow: hidden;
}

/* Header */
#header {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 12px 18px 10px;
  position: sticky; top: 0; z-index: 10; flex-shrink: 0;
  text-align: center;
}
#header h1 { font-size: 19px; font-weight: 800; letter-spacing: -.02em; }
#date-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px; }
#date-input {
  font-family: var(--font); font-size: 14px; font-weight: 600;
  color: var(--muted); border: none; background: transparent; outline: none;
  text-align: center;
}

main {
  padding: 6px 10px 4px; max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column; justify-content: flex-start;
  flex: 1; min-height: 0; overflow: hidden; width: 100%;
}

/* Tile grid — one flat grid, no section headings, all tiles the same size.
   Column count is fixed but tile size is computed in JS (sizeGrid()) from
   whatever screen height/width is actually available, so the whole grid
   always fills the screen edge-to-edge with no scrolling, on any device. */
.tile-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--tile-gap-size, 9px);
  justify-content: center; align-content: center;
}
.tile {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  width: var(--tile-size, 100%); height: var(--tile-size, auto);
  aspect-ratio: 1 / 1; padding: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; gap: 3px;
  cursor: pointer; transition: transform .12s, background .12s;
  position: relative; -webkit-user-select: none; user-select: none;
}
.tile:active { transform: scale(.96); background: #fafafa; }
.tile.logged { background: var(--green-light); border-color: var(--green-border); }
.tile-label { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
.tile-value { font-size: 18px; font-weight: 800; color: var(--target-color); word-break: break-word; }
.tile.logged .tile-value { color: var(--green); }
.tile-unit { font-size: 12px; font-weight: 600; color: var(--muted); }
.tile-check {
  position: absolute; top: 7px; right: 7px; width: 17px; height: 17px; border-radius: 50%;
  background: var(--green); color: white; font-size: 10px; font-weight: 800;
  display: none; align-items: center; justify-content: center;
}
.tile.logged .tile-check { display: flex; }

.tile-emoji { font-size: 15px; line-height: 1; }

/* Combo fields inside the log sheet — several sub-fields shown together */
.combo-field { width: 100%; margin-bottom: 20px; }
.combo-field:last-child { margin-bottom: 0; }
.combo-field-label { font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; margin-bottom: 10px; }

/* Simple on/off toggle — green when done, red when not, used for every
   plain yes/no field instead of two separate Done/Not-done buttons. */
.combo-toggle-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.combo-toggle-state { font-size: 13px; font-weight: 700; color: var(--muted); }
.combo-toggle-wrap { position: relative; width: 52px; height: 30px; flex-shrink: 0; display: block; }
.combo-toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
.combo-toggle-track {
  position: absolute; inset: 0; background: #e0596b; border-radius: 999px;
  cursor: pointer; transition: background .2s;
}
.combo-toggle-wrap input:checked + .combo-toggle-track { background: var(--green); }
.combo-toggle-thumb {
  position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: white;
  border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .2s; pointer-events: none;
}
.combo-toggle-wrap input:checked ~ .combo-toggle-thumb { transform: translateX(22px); }

/* 3-way row (Workout: Done / Rest day / Not done) */
.combo-bool-row { display: flex; gap: 10px; width: 100%; }
.combo-bool-btn {
  flex: 1; padding: 14px 8px; border-radius: 10px; border: 1.5px solid var(--border);
  background: white; font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer;
}
.combo-bool-btn.selected { background: var(--green); color: white; border-color: var(--green); }

.combo-num-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
.combo-step-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0;
  background: white; font-size: 18px; font-weight: 700; color: var(--text); cursor: pointer;
}
.combo-step-btn:active { background: #f3f4f6; }
.combo-num-input {
  font-family: var(--font); font-size: 24px; font-weight: 800; text-align: center;
  border: none; outline: none; width: 90px; color: var(--text);
}
.combo-num-unit { font-size: 12px; color: var(--muted); font-weight: 600; }

/* Log sheet — tap a tile to open, enter a value, Save locks it */
#log-sheet {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,.4);
}
#log-sheet.open { display: flex; }
#log-panel {
  background: white; border-radius: 20px 20px 0 0;
  padding: 26px 22px calc(24px + var(--safe-bottom));
  width: 100%; max-width: 480px;
}
#log-panel h3 { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 4px; }
#log-target-row {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; color: var(--muted); margin: 6px 0 24px; text-align: center;
}
#log-target-edit { color: var(--target-color); font-weight: 600; cursor: pointer; text-decoration: underline; }
#log-target-input {
  font-family: var(--font); font-size: 15px; font-weight: 700; text-align: center;
  border: none; border-bottom: 2px solid var(--green); outline: none; width: 100px; display: none;
  margin: 4px 0 24px;
}
#log-control { min-height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 26px; }

.log-num-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
.log-step-btn {
  width: 46px; height: 46px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0;
  background: white; font-size: 20px; font-weight: 700; color: var(--text); cursor: pointer;
}
.log-step-btn:active { background: #f3f4f6; }
.log-num-mid { display: flex; flex-direction: column; align-items: center; }
#log-num-input {
  font-family: var(--font); font-size: 32px; font-weight: 800; text-align: center;
  border: none; outline: none; width: 130px; color: var(--text);
}
#log-num-unit { font-size: 13px; color: var(--muted); font-weight: 600; }

#log-time-input {
  font-family: var(--font); font-size: 32px; font-weight: 800; text-align: center;
  border: none; outline: none; color: var(--text);
}

.log-rating-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; }
.log-rating-btn {
  aspect-ratio: 1 / 1; border-radius: 10px; border: 1.5px solid var(--border);
  background: white; font-size: 15px; font-weight: 700; color: var(--muted); cursor: pointer;
}
.log-rating-btn.selected { background: var(--green); color: white; border-color: var(--green); }
.log-rating-btn.target-mark { color: var(--target-color); }

/* Save bar */
#save-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid var(--border);
  padding: 12px 14px;
  padding-bottom: calc(12px + var(--safe-bottom));
  z-index: 10;
}
#save-btn {
  width: 100%; max-width: 480px; margin: 0 auto; display: block;
  padding: 15px; background: var(--green); color: white;
  font-family: var(--font); font-size: 16px; font-weight: 800;
  border: none; border-radius: 12px; cursor: pointer;
  transition: all .15s; letter-spacing: -.01em;
}
#save-btn:active { transform: scale(.98); background: #359960; }
#save-btn:disabled { background: #9ca3af; cursor: default; transform: none; }

/* Toast */
#toast {
  position: fixed; top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-16px);
  background: #111; color: white; font-size: 14px; font-weight: 600;
  padding: 10px 20px; border-radius: 20px; opacity: 0;
  pointer-events: none; transition: all .22s; z-index: 100; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.success { background: var(--green); }
#toast.error { background: #dc2626; }

#log-panel-btns { display: flex; justify-content: center; gap: 12px; margin-top: 6px; }
.tpbtn {
  min-width: 120px; padding: 13px 22px; border-radius: 10px; border: 1px solid var(--border);
  font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer;
  background: white;
}
.tpbtn.confirm { background: var(--green); color: white; border-color: var(--green); }
</style>
</head>
<body>

<div id="header">
  <h1>Habits</h1>
  <div id="date-row">
    <input type="date" id="date-input">
  </div>
</div>

<main>
  <div class="tile-grid" id="tile-grid"></div>
</main>

<div id="save-bar">
  <button id="save-btn">Save to Sheets</button>
</div>

<div id="toast"></div>

<!-- Log sheet: tap a tile to open this, enter the value, Save locks the tile for the day -->
<div id="log-sheet">
  <div id="log-panel">
    <h3 id="log-panel-title">Habit</h3>
    <div id="log-target-row">
      <span id="log-target-text"></span>
      <span id="log-target-edit">Edit target</span>
    </div>
    <input type="text" id="log-target-input" inputmode="decimal">
    <div id="log-control"></div>
    <div id="log-panel-btns">
      <button class="tpbtn" id="log-cancel">Cancel</button>
      <button class="tpbtn confirm" id="log-save">Save</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbydjK9gO8GvYncyzSHBIbgqTUcK-uzsxwWiiZdPL-1ykNZaVBezDQxY2lr_79J77B2nhw/exec';
const APP_SECRET = '4e78845d45f9634d2afdcd68da36c64f';
const DRAFT_KEY  = 'habit-logger-draft-v2';
const TARGET_KEY = 'habit-logger-targets';

const DEFAULT_TARGETS = {
  'wake-time':     '04:30',
  'steps':         '10000',
  'calories':      '1550',
  'water':         '5',
  'morning-pages': '30',
  'writing':       '60',
  'lyrics':        '2',
  'reading':       '90',
  'audiobooks':    '30',
  'ebay-listings': '40',
  'dog-walk-1':    '60',
  'dog-walk-2':    '60',
  'dog-training':  '15',
  'bedtime':       '21:30',
  'day-rating':    '7',
};

// Client-side mirror of the Apps Script HABITS list — drives tile rendering
// and which control the log sheet shows. Keep in sync with the server list.
// Order is deliberate: chronological through the day, wake-up/bedtime bookend
// the grid, and cumulative/uncertain-until-later habits (steps, water,
// calories, supplements, eBay listings, audiobooks) sit in the back half
// since you only know where they'll land as the day unfolds.
// "combo" tiles group several already-separate Sheet columns behind one
// tile — tap it and every sub-field shows together in the same sheet,
// per Drew's call to see them all at once rather than picking one first.
// Sleep is deliberately absent — it's now a spreadsheet formula computed
// from the previous night's bedtime + that day's wake-up, not app-logged.
const HABITS_META = [
  { key: 'wake-time',     label: 'Wake-up',       emoji: '🌅', type: 'time' },
  { key: 'morning-pages', label: 'Morning pages', emoji: '📝', type: 'number', unit: 'min', step: 5 },
  { key: 'workout',       label: 'Workout',       emoji: '💪', type: 'tristate' },
  { key: 'skincare',      label: 'Skincare',      emoji: '🧴', type: 'combo', fields: [
      { key: 'skincare-am', label: 'AM', type: 'boolean' },
      { key: 'skincare-pm', label: 'PM', type: 'boolean' },
    ] },
  { key: 'writing',       label: 'Writing',       emoji: '✍️', type: 'number', unit: 'min', step: 5 },
  { key: 'lyrics',        label: 'Song lyrics',   emoji: '🎤', type: 'number', unit: 'songs', step: 1 },
  { key: 'books',         label: 'Books',         emoji: '📚', type: 'combo', fields: [
      { key: 'reading',    label: 'Reading',    type: 'number', unit: 'min', step: 5 },
      { key: 'audiobooks', label: 'Audiobooks', type: 'number', unit: 'min', step: 5 },
    ] },
  { key: 'steps',         label: 'Steps',         emoji: '👣', type: 'number', unit: 'steps', step: 100, noStepper: true },
  { key: 'water',         label: 'Water',         emoji: '💧', type: 'number', unit: 'L', step: 0.25 },
  { key: 'diet',          label: 'Diet',          emoji: '🍽️', type: 'combo', fields: [
      { key: 'calories',     label: 'Calories',     type: 'number', unit: 'kcal', step: 10 },
      { key: 'supplements',  label: 'Supplements',  type: 'boolean' },
    ] },
  { key: 'ebay-listings', label: 'eBay listings', emoji: '📦', type: 'number', unit: '', step: 1 },
  { key: 'dog',           label: 'Dog',           emoji: '🐶', type: 'combo', fields: [
      { key: 'dog-walk-1',  label: 'Walk 1',  type: 'number', unit: 'min', step: 5 },
      { key: 'dog-walk-2',  label: 'Walk 2',  type: 'number', unit: 'min', step: 5 },
      { key: 'dog-training', label: 'Training', type: 'number', unit: 'min', step: 5 },
    ] },
  { key: 'bedtime',       label: 'Bedtime',       emoji: '🌙', type: 'time' },
  { key: 'day-rating',    label: 'Day rating',    emoji: '⭐', type: 'rating' },
];

// Local calendar date (phone's own timezone) as YYYY-MM-DD. Deliberately not
// toISOString(), which returns the UTC date — that would roll "today" over
// at UTC midnight (~10-11am in Sydney) instead of actual local midnight.
function localDateStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

let targets = loadTargets();
let values = {};       // today's entered values, keyed same as HABITS_META
let editingKey = null; // habit key currently open in the log sheet
let pendingValue = null; // value the log sheet control currently holds, applied on Save

// ── Init ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('date-input').value = localDateStr();

  loadDraft();
  renderTiles();
  sizeGrid();
  window.addEventListener('resize', sizeGrid);
  window.addEventListener('orientationchange', sizeGrid);

  document.getElementById('log-cancel').addEventListener('click', closeLogSheet);
  document.getElementById('log-save').addEventListener('click', saveLogValue);
  document.getElementById('log-sheet').addEventListener('click', e => {
    if (e.target === document.getElementById('log-sheet')) closeLogSheet();
  });
  document.getElementById('log-target-edit').addEventListener('click', startEditTarget);
  document.getElementById('log-target-input').addEventListener('blur', confirmEditTarget);

  document.getElementById('save-btn').addEventListener('click', saveToSheets);
});

// ── Tiles ──────────────────────────────────────────────
function getGridCols() {
  const v = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--grid-cols'));
  return v || 3;
}

const TILE_HABITS = HABITS_META;

function renderTiles() {
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  TILE_HABITS.forEach(h => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.key = h.key;
    tile.addEventListener('click', () => openLogSheet(h.key));
    grid.appendChild(tile);
  });
  updateTileStates();
}

// ── Tile sizing ──────────────────────────────────────────
function applySizing(tileSize, tileGap) {
  const grid = document.getElementById('tile-grid');
  const cols = getGridCols();
  grid.style.setProperty('--tile-gap-size', tileGap + 'px');
  grid.style.setProperty('--tile-size', tileSize + 'px');
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', ' + tileSize + 'px)';
}

function sizeGrid() {
  const header = document.getElementById('header');
  const saveBar = document.getElementById('save-bar');
  const main = document.querySelector('main');
  const grid = document.getElementById('tile-grid');

  // Reserve exactly the save bar's real rendered height (a static 90px
  // guess didn't match reality and let main's box run taller than the
  // visible gap above the save bar).
  document.body.style.paddingBottom = saveBar.getBoundingClientRect().height + 'px';

  const cols = getGridCols();
  const count = TILE_HABITS.length;
  const rows = Math.ceil(count / cols);
  const tileGap = parseFloat(getComputedStyle(grid).columnGap) || 9;
  const mainCs = getComputedStyle(main);
  const availW = main.clientWidth - parseFloat(mainCs.paddingLeft) - parseFloat(mainCs.paddingRight);

  const padY = parseFloat(mainCs.paddingTop) + parseFloat(mainCs.paddingBottom);
  const totalAvail = saveBar.getBoundingClientRect().top - header.getBoundingClientRect().bottom - padY;

  // Small safety margin so tiles land a touch smaller than a razor-tight
  // fit — guarantees clear breathing room above the save bar.
  const SAFETY_MARGIN = 14;
  const availH = totalAvail - SAFETY_MARGIN;
  const sizeByWidth = (availW - tileGap * (cols - 1)) / cols;
  const sizeByHeight = (availH - tileGap * (rows - 1)) / rows;
  // 0.9 = tiles deliberately sized 10% smaller than a tight fit, per Drew's
  // request — the grid no longer aims to fill every last pixel (25% was too
  // aggressive, 10% is the right amount of breathing room).
  const tileSize = Math.max(24, Math.floor(Math.min(sizeByWidth, sizeByHeight) * 0.9));

  applySizing(tileSize, tileGap);
}
window.sizeGrid = sizeGrid;

// Targets only ever show inside the log sheet, not on the tile itself —
// the tile face is blank until logged, then shows the entered value.
// Combo tiles (Skincare, Books, Diet, Dog) never show a value summary on
// the tile face, just the checkmark once every sub-field is filled — same
// "targets/values only show inside the sheet" convention as everything else.
function displayValue(h) {
  if (h.type === 'combo') return '';
  const v = values[h.key];
  if (v !== undefined && v !== '' && v !== null) {
    if (h.type === 'boolean') return v === 'TRUE' ? 'Done' : 'Not done';
    if (h.type === 'tristate') return v === 'TRUE' ? 'Done' : v === 'REST' ? 'Rest day' : 'Not done';
    return String(v);
  }
  return '';
}

function isLogged(h) {
  if (h.type === 'combo') {
    return h.fields.every(f => {
      const v = values[f.key];
      return v !== undefined && v !== '' && v !== null;
    });
  }
  const v = values[h.key];
  return v !== undefined && v !== '' && v !== null;
}

function updateTileStates() {
  document.querySelectorAll('.tile').forEach(tile => {
    const key = tile.dataset.key;
    const meta = TILE_HABITS.find(h => h.key === key);
    tile.classList.toggle('logged', isLogged(meta));
    const value = displayValue(meta);
    tile.innerHTML =
      '<div class="tile-check">✓</div>' +
      '<div class="tile-label">' + meta.label + '</div>' +
      '<div class="tile-emoji">' + meta.emoji + '</div>' +
      (value ? '<div><div class="tile-value">' + value + '</div>' +
        (meta.unit ? '<div class="tile-unit">' + meta.unit + '</div>' : '') + '</div>' : '');
  });
}

// ── Targets ────────────────────────────────────────────
function loadTargets() {
  try {
    const raw = localStorage.getItem(TARGET_KEY);
    if (raw) return { ...DEFAULT_TARGETS, ...JSON.parse(raw) };
  } catch(e) {}
  return { ...DEFAULT_TARGETS };
}
function saveTargets() {
  localStorage.setItem(TARGET_KEY, JSON.stringify(targets));
}

function renderTargetText(meta) {
  const t = targets[meta.key];
  document.getElementById('log-target-text').textContent =
    t ? ('Target: ' + t + (meta.unit ? ' ' + meta.unit : '')) : 'No target set';
}

function startEditTarget() {
  const meta = HABITS_META.find(h => h.key === editingKey);
  if (!meta) return;
  document.getElementById('log-target-text').style.display = 'none';
  document.getElementById('log-target-edit').style.display = 'none';
  const input = document.getElementById('log-target-input');
  input.style.display = '';
  input.value = targets[editingKey] || '';
  input.inputMode = meta.type === 'time' ? 'text' : 'decimal';
  input.focus();
}
function confirmEditTarget() {
  const input = document.getElementById('log-target-input');
  const val = input.value.trim();
  if (val && editingKey) { targets[editingKey] = val; saveTargets(); }
  input.style.display = 'none';
  document.getElementById('log-target-text').style.display = '';
  document.getElementById('log-target-edit').style.display = '';
  const meta = HABITS_META.find(h => h.key === editingKey);
  if (meta) renderTargetText(meta);
}

// ── Log sheet ──────────────────────────────────────────
function buildNumberControl(container, currentVal, unit, step, onChange, noStepper) {
  const row = document.createElement('div');
  row.className = 'combo-num-row';
  const mid = document.createElement('div');
  mid.style.display = 'flex'; mid.style.flexDirection = 'column'; mid.style.alignItems = 'center';
  const input = document.createElement('input');
  input.type = 'text'; input.inputMode = 'decimal'; input.className = 'combo-num-input';
  input.placeholder = '—'; input.value = currentVal;
  mid.appendChild(input);
  if (unit) {
    const unitEl = document.createElement('div');
    unitEl.className = 'combo-num-unit'; unitEl.textContent = unit;
    mid.appendChild(unitEl);
  }
  input.addEventListener('input', () => onChange(input.value));
  // Select the existing value on tap so typing a new number (e.g. 1.2, 2.1)
  // is a clean overwrite instead of having to manually clear it first.
  input.addEventListener('focus', () => input.select());

  // Steps (and anything else marked noStepper) is free numeric entry only —
  // a +/- stepper doesn't make sense for typing an exact step count.
  if (noStepper) {
    row.appendChild(mid);
    container.appendChild(row);
    return;
  }

  const dec = document.createElement('button');
  dec.className = 'combo-step-btn'; dec.type = 'button'; dec.textContent = '−';
  const inc = document.createElement('button');
  inc.className = 'combo-step-btn'; inc.type = 'button'; inc.textContent = '+';
  const stepStr = String(step);
  const dotIdx = stepStr.indexOf('.');
  const decimals = dotIdx === -1 ? 0 : stepStr.length - dotIdx - 1;
  const doStep = (delta) => {
    const cur = parseFloat(input.value || '0') || 0;
    input.value = (cur + delta).toFixed(decimals);
    onChange(input.value);
  };
  dec.addEventListener('click', () => doStep(-step));
  inc.addEventListener('click', () => doStep(step));
  row.appendChild(dec); row.appendChild(mid); row.appendChild(inc);
  container.appendChild(row);
}

// Simple green/red on-off toggle for plain yes/no fields — replaces the
// old two-button Done/Not-done row to save space and make it a one-tap flip.
function buildBoolControl(container, currentVal, onChange) {
  // Stacked (state label above the switch, both centered) instead of side
  // by side — a right-aligned label next to a fixed-width switch shifts
  // the visual center depending on label length ("AM" vs "Supplements"),
  // so rows never lined up consistently. Stacking sidesteps that entirely.
  const col = document.createElement('div');
  col.className = 'combo-toggle-col';
  const wrap = document.createElement('label');
  wrap.className = 'combo-toggle-wrap';
  const input = document.createElement('input');
  input.type = 'checkbox';
  input.checked = currentVal === 'TRUE';
  const track = document.createElement('div');
  track.className = 'combo-toggle-track';
  const thumb = document.createElement('div');
  thumb.className = 'combo-toggle-thumb';
  wrap.appendChild(input); wrap.appendChild(track); wrap.appendChild(thumb);
  const state = document.createElement('div');
  state.className = 'combo-toggle-state';
  state.textContent = currentVal === 'TRUE' ? 'Done' : 'Not done';
  input.addEventListener('change', () => {
    state.textContent = input.checked ? 'Done' : 'Not done';
    onChange(input.checked ? 'TRUE' : 'FALSE');
  });
  col.appendChild(wrap); col.appendChild(state);
  container.appendChild(col);
}

// Workout: Done / Rest day / Not done — a rest day is a planned day off,
// distinct from simply not working out, per Drew's 5-workout/2-rest weekly split.
function buildTristateControl(container, currentVal, onChange) {
  const row = document.createElement('div');
  row.className = 'combo-bool-row';
  [['TRUE', 'Done'], ['REST', 'Rest day'], ['FALSE', 'Not done']].forEach(([val, label]) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'combo-bool-btn' + (currentVal === val ? ' selected' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => {
      row.querySelectorAll('.combo-bool-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      onChange(val);
    });
    row.appendChild(btn);
  });
  container.appendChild(row);
}

function openLogSheet(key) {
  editingKey = key;
  const meta = HABITS_META.find(h => h.key === key);
  const control = document.getElementById('log-control');
  control.innerHTML = '';
  document.getElementById('log-panel-title').textContent = meta.emoji + ' ' + meta.label;

  if (meta.type === 'combo') {
    // No single target row — each sub-field shows its own target inline instead.
    document.getElementById('log-target-row').style.display = 'none';
    pendingValue = {};
    meta.fields.forEach(f => {
      pendingValue[f.key] = values[f.key] ?? '';
      const wrap = document.createElement('div');
      wrap.className = 'combo-field';
      const t = targets[f.key];
      const labelEl = document.createElement('div');
      labelEl.className = 'combo-field-label';
      labelEl.textContent = f.label + (t ? ' · target ' + t + (f.unit ? ' ' + f.unit : '') : '');
      wrap.appendChild(labelEl);
      if (f.type === 'boolean') {
        buildBoolControl(wrap, pendingValue[f.key], (val) => { pendingValue[f.key] = val; });
      } else {
        buildNumberControl(wrap, pendingValue[f.key], f.unit, f.step, (val) => { pendingValue[f.key] = val; });
      }
      control.appendChild(wrap);
    });
    document.getElementById('log-sheet').classList.add('open');
    return;
  }

  document.getElementById('log-target-row').style.display = '';
  document.getElementById('log-target-input').style.display = 'none';
  document.getElementById('log-target-text').style.display = '';
  document.getElementById('log-target-edit').style.display = '';
  renderTargetText(meta);

  pendingValue = values[key] ?? '';

  if (meta.type === 'number') {
    buildNumberControl(control, pendingValue, meta.unit, meta.step, (val) => { pendingValue = val; }, meta.noStepper);
  } else if (meta.type === 'time') {
    control.innerHTML = '<input type="time" id="log-time-input" step="600">';
    const input = document.getElementById('log-time-input');
    input.value = pendingValue;
    input.addEventListener('input', () => pendingValue = input.value);
  } else if (meta.type === 'boolean') {
    buildBoolControl(control, pendingValue, (val) => { pendingValue = val; });
  } else if (meta.type === 'tristate') {
    buildTristateControl(control, pendingValue, (val) => { pendingValue = val; });
  } else if (meta.type === 'rating') {
    const grid = document.createElement('div');
    grid.className = 'log-rating-grid';
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement('button');
      const isTarget = String(i) === targets['day-rating'];
      const isSelected = String(pendingValue) === String(i);
      btn.className = 'log-rating-btn' + (isTarget && !isSelected ? ' target-mark' : '') + (isSelected ? ' selected' : '');
      btn.textContent = i;
      btn.addEventListener('click', () => {
        grid.querySelectorAll('.log-rating-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        pendingValue = i;
      });
      grid.appendChild(btn);
    }
    control.appendChild(grid);
  }

  document.getElementById('log-sheet').classList.add('open');
}

function closeLogSheet() {
  document.getElementById('log-sheet').classList.remove('open');
  editingKey = null;
}

function saveLogValue() {
  if (!editingKey) return;
  const meta = HABITS_META.find(h => h.key === editingKey);

  if (meta.type === 'combo') {
    let anySaved = false;
    meta.fields.forEach(f => {
      const val = pendingValue[f.key];
      if (val === '' || val === undefined || val === null) return;
      values[f.key] = val;
      saveField(f.key, val);
      anySaved = true;
    });
    if (anySaved) saveDraft();
    updateTileStates();
    closeLogSheet();
    return;
  }

  const val = pendingValue;
  if (val === '' || val === undefined || val === null) { closeLogSheet(); return; }
  values[editingKey] = val;
  saveDraft();
  saveField(editingKey, val);
  updateTileStates();
  closeLogSheet();
}

// ── Draft ──────────────────────────────────────────────
function getFormData() {
  return { Date: document.getElementById('date-input').value, ...values };
}

function saveDraft() {
  localStorage.setItem(DRAFT_KEY, JSON.stringify(getFormData()));
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    const today = localDateStr();
    if (d['Date'] && d['Date'] !== today) return;
    values = { ...d };
    delete values['Date'];
  } catch(e) {}
}

// ── Save ───────────────────────────────────────────────
// Saves a single field immediately (called on toggle/blur/rating tap).
// Only sends Date + this one key, so nothing else on the row gets touched.
let fieldSaveSeq = 0;
async function saveField(key, value) {
  const mySeq = ++fieldSaveSeq;
  const payload = { Date: document.getElementById('date-input').value, secret: APP_SECRET };
  payload[key] = value;
  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if (mySeq !== fieldSaveSeq) return; // a newer save superseded this one
    if (json.ok) showToast('Saved ✓', 'success');
    else showToast(json.error === 'unauthorized' ? 'Auth error' : 'Save failed', 'error');
  } catch (e) {
    if (mySeq !== fieldSaveSeq) return;
    showToast('Offline — saved to draft only', 'error');
  }
}

async function saveToSheets() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showToast('Paste your Apps Script URL first', 'error'); return;
  }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const payload = { ...getFormData(), secret: APP_SECRET };
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if (json.ok) {
      localStorage.removeItem(DRAFT_KEY);
      showToast('Saved ✓', 'success');
      btn.textContent = 'Saved ✓';
      setTimeout(() => { btn.textContent = 'Save to Sheets'; btn.disabled = false; }, 2000);
    } else { throw new Error(json.error || 'Error'); }
  } catch(e) {
    showToast('Failed — check connection', 'error');
    btn.textContent = 'Save to Sheets'; btn.disabled = false;
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2500);
}
</script>
